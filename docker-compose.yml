services:
  db:
    image: postgres:16-alpine
    container_name: stezhky-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: stezhky
      POSTGRES_PASSWORD: stezhky
      POSTGRES_DB: stezhky
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stezhky -d stezhky"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: stezhky-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://stezhky:stezhky@db:5432/stezhky?schema=public
      APP_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
